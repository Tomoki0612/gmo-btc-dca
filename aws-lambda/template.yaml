AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: BTC自動積立Lambda関数 - GMOコインAPIを使用した定期購入

Parameters:
  ScheduleExpression:
    Type: String
    Default: "cron(0 * * * ? *)"
    Description: 実行スケジュール（毎時0分に起動、実行判定はLambda側で実施）

  EnableSnsNotification:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: SNS通知を有効にするか

  NotificationEmail:
    Type: String
    Default: ""
    Description: 通知先メールアドレス（空の場合はSNS通知なし）

  DryRun:
    Type: String
    Default: "false"
    Description: テスト実行フラグ

Conditions:
  CreateSnsResources: !And
    - !Equals [!Ref EnableSnsNotification, "true"]
    - !Not [!Equals [!Ref NotificationEmail, ""]]

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: python3.11

Resources:
  BtcAutoPurchaseFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: btc-auto-purchase
      CodeUri: auto-purchase/
      Handler: btc_auto_purchase.lambda_handler
      Description: GMOコインでBTCを自動購入するLambda関数
      Environment:
        Variables:
          SNS_TOPIC_ARN: !If
            - CreateSnsResources
            - !Ref BtcPurchaseNotificationTopic
            - ""
          DRY_RUN: !Ref DryRun
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: !If
                - CreateSnsResources
                - !Ref BtcPurchaseNotificationTopic
                - !Sub "arn:aws:sns:${AWS::Region}:${AWS::AccountId}:*"
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/btc-dca-settings"
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/btc-dca-history"
      Events:
        ScheduledPurchase:
          Type: Schedule
          Properties:
            Name: btc-daily-purchase
            Description: BTC定期購入スケジュール
            Schedule: !Ref ScheduleExpression
            Enabled: true

  BtcDcaHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: btc-dca-history
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

  BtcPurchaseNotificationTopic:
    Type: AWS::SNS::Topic
    Condition: CreateSnsResources
    Properties:
      TopicName: btc-purchase-notifications
      DisplayName: BTC購入通知

  BtcPurchaseEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: CreateSnsResources
    Properties:
      TopicArn: !Ref BtcPurchaseNotificationTopic
      Protocol: email
      Endpoint: !Ref NotificationEmail

Outputs:
  FunctionArn:
    Description: Lambda関数のARN
    Value: !GetAtt BtcAutoPurchaseFunction.Arn

  FunctionName:
    Description: Lambda関数名
    Value: !Ref BtcAutoPurchaseFunction

  SnsTopicArn:
    Description: SNSトピックのARN
    Condition: CreateSnsResources
    Value: !Ref BtcPurchaseNotificationTopic
